[functions]
  node_bundler = "esbuild"

[functions."updatePredictions"]
  # Netlify scheduled functions use UTC. 10:00 and 19:00 UTC = 6 AM and 3 PM ET during daylight saving time.
  # During standard time, this runs 5 AM and 2 PM ET. Adjust to "0 11,20 * * *" in winter if needed.
  schedule = "0 10,19 * * *"
